<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Grid-Exercise</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <section>
        <figure class="title">
            <img src="img/imgtitle.jpg" alt="Logotipo en letras plateadas metálicas con el nombre de la banda (NIGHTGLARE) sobre fondo negro.">
        </figure>
        <figure class="horizontalposter">
            <img src="img/imghorizontalposter.png" alt=" Los cuatro integrantes de la banda posando juntos frente a un fondo oscuro con niebla, con el bajista sentado sobre un amplificador">
        </figure>
        <figure class="vocalist">
            <img src="img/imgvocalist.png" alt="Retrato de la cantante con cabello oscuro y mechas rojas sosteniendo un micrófono.">
        </figure>
        <figure class="guitarist">
            <img src="img/imgguitarist.jpg" alt="Guitarrista con cabello blanco y jersey negro roto tocando una guitarra eléctrica.">
        </figure>
        <figure class="backstage">
            <img src="img/imgbackstage.png" alt="Los cuatro integrantes de la banda relajados en un sofá de cuero en el camerino (backstage).">
        </figure>
        <figure class="verticalposter">
            <img src="img/imgverticalposter.png" alt="Fotografía grupal de la banda posando en un callejón nocturno iluminado por luces de la ciudad.">
        </figure>
        <figure class="vocalist-bassist">
            <img src="img/imgvocalist&bassist.png" alt="La vocalista y el bajista posando espalda contra espalda sobre un fondo púrpura.">
        </figure>
        <figure class="guitarist-drummer">
            <img src="img/imgguitarist&drummer.png" alt="El guitarrista de cabello blanco y la baterista rubia posando juntos.">
        </figure>
        <figure class="bassist">
            <img src="img/imgbassist.png" alt="Retrato del bajista con ropa negra tocando un bajo eléctrico de cuatro cuerdas.">
        </figure>
        <figure class="drummer">
            <img src="img/imgdrummer.png" alt="Retrato de la baterista con cabello rubio corto sosteniendo un par de baquetas.">
        </figure>
        <figure class="concert">
            <img src="img/imgconcert.png" alt="La banda completa actuando en vivo sobre un escenario con luces intensas y su logo al fondo.">
        </figure>
    </section>
</body>
</html>
